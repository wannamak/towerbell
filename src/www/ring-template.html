<html lang="en">
<head>
  <title>Tower Bell</title>
  <link rel="icon" href="/static/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <link rel="stylesheet" href="/static/common.css">
  <link rel="stylesheet" href="/static/ring.css">
  <script src="/static/xhr.js"></script>
  <script src="/static/ring.js"></script>
</head>
<body>

$HEADER

<div style="padding-top: 1em; padding-bottom: 1em;"></div>

<div style="display: flex; justify-content: center; flex-direction: column; align-items: center; gap: 3em;">
  <div class="infobox">
    Current time: <span id="clock">$NOW</span><br/>
    Next ring: $NEXT_RING
  </div>

  <div>
    <div class="ringbutton" onclick="onRing();">R I N G</div>
  </div>

  <div>
    <div class="errormessage" id="errorMessage"></div>
  </div>

  <div>
    <a href="/">Back</a>
  </div>
</div>

<script lang="javascript">
  const serverNow = new Date("$ISO_NOW");
  const clientNow = new Date();
  const offset = serverNow - clientNow; // difference in ms

  const el = document.getElementById('clock');
  setInterval(() => {
    el.textContent = formatDateTime(new Date(Date.now() + offset));
  }, 1000);
</script>

</body>
</html>
