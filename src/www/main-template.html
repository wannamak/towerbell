<html lang="en">
<head>
  <title>Tower Bell</title>
  <link rel="icon" href="/static/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <style>
@font-face {
  font-family: 'Roboto';
  src: url('/static/roboto.woff2') format('woff2');
  font-weight: 400;
  font-style: normal;
}
body {
  font-family: 'Roboto', sans-serif;
  font-size: 20px;
  padding: 0;
  margin: 0;
}

.table {
  display: table;
  border-collapse: collapse;
}

.row {
  display: table-row;
}

.row:not(.header):not(.footer):hover {
  background: #f5f5f5;
}

.row:not(.footer) .cell {
  border-bottom: 1px solid #ddd;
}

.cell {
  display: table-cell;
  padding: 8px 16px;  /* vert horiz */
  vertical-align: middle;
}

.checkbox {
  text-align: center;
  padding: 8px 0px;  /* vert horiz */
}

.header .cell {
  font-weight: bold;
  background: #eee;
  border-top: 2px solid #ccc;
  border-bottom: 2px solid #ccc;
  border-left: 1px solid #aaa;
  border-right: 1px solid #aaa;
}

.footer {
}

.infobox {
  padding: 1em;
  border-radius: 1em;
  border: 2px solid #898989;
  font-size: 20px;
}

.credit {
  padding-top: 5em;
  text-align: center;
  font-size: 12px;
  color: #898989;
}

/* -- switch -- */
.switch {
  position: relative;
  display: inline-block;
  width: 48px;
  height: 26px;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  inset: 0;
  background-color: #ccc;
  border-radius: 26px;
  transition: background-color 0.2s;
}

.slider::before {
  content: "";
  position: absolute;
  height: 20px;
  width: 20px;
  left: 3px;
  bottom: 3px;
  background-color: white;
  border-radius: 50%;
  transition: transform 0.2s;
}

input:checked + .slider {
  background-color: #4a90e2;
}

input:checked + .slider::before {
  transform: translateX(22px);
}

.silent {
  font-size: 20px;
}
  </style>
  <script src="/static/xhr.js"></script>
  <script src="/static/main.js"></script>
</head>
<body>

<div style="display: flex; align-items: center; justify-content: flex-start; width: 100%;
            background-color: #555555; padding: 1em; color: #FFFFFF;">
  <img style="height: 100px;" src="/static/logo.png">
  <!-- flex-grow: 1; text-align: center; -->
  <div style="margin-left: auto; margin-right: 1em; font-size: 3em;">Tower Bell</div>
</div>

<div style="padding-top: 1em; padding-bottom: 1em;"></div>

<div style="display: flex; justify-content: center; flex-direction: column; align-items: center; gap: 3em;">
  <div class="infobox">
    Current time: $NOW<br/>
    Next ring: $NEXT_RING
  </div>

  <div style="display: flex; align-items: center; gap: 8px;">
    <label class="switch">
      <input type="checkbox" id="silent" $SILENCE_CHECKED onclick="onSilentChanged(this);">
      <span class="slider"></span>
    </label>
    <span>Silent mode</span>
  </div>

  <div class="table">
    <div class="row header">
      <div class="cell">S</div>
      <div class="cell">M</div>
      <div class="cell">T</div>
      <div class="cell">W</div>
      <div class="cell">T</div>
      <div class="cell">F</div>
      <div class="cell">S</div>
      <div class="cell">Ring</div>
      <div class="cell">Every</div>
      <div class="cell">Start</div>
      <div class="cell">End</div>
      <div class="cell">Silence Between Rings</div>
      <div class="cell">Actions</div>
    </div>

    $SCHEDULE

    <div class="row footer">
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell">
        <a onclick="onAdd();" style="display: flex; align-items: center; gap: 4px;">
          <img alt="Add" src="/static/new.png"/> Add
        </a>
      </div>
    </div>

  </div>

  <div>
    <a href="/ring">Manual Ring</a> | <a href="/config">Advanced Settings</a>
  </div>

  <div class="credit">
    $VERSION<br/>
    (c) 2026 Wannamaker Consulting LLC<br/>
    <a href="mailto:keith@wannamaker.org">keith@wannamaker.org</a>
  </div>
</div>

</body>
</html>
