<html lang="en">
<head>
  <title>Tower Bell</title>
  <link rel="icon" href="/static/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <link rel="stylesheet" href="/static/common.css">
  <link rel="stylesheet" href="/static/main.css">
  <script src="/static/xhr.js"></script>
  <script src="/static/main.js"></script>
  <script src="/static/time.js"></script>
</head>
<body>

$HEADER

<div style="display: flex; justify-content: center; flex-direction: column; align-items: center; gap: 3em;">
  <div class="infobox">
    <span style="color: #555555;">Current time:</span> <span id="clock"></span><br/>
    <span style="color: #555555;">Next event:</span> <span id="countdown"></span>
  </div>

  <div style="display: flex; align-items: center; gap: 8px;">
    <label class="switch">
      <input type="checkbox" id="silent" $SILENCE_CHECKED onclick="onSilentChanged(this);">
      <span class="slider"></span>
    </label>
    <span>Silent mode</span>
  </div>

  <div class="table">
    <div class="row header">
      <div class="cell">S</div>
      <div class="cell">M</div>
      <div class="cell">T</div>
      <div class="cell">W</div>
      <div class="cell">T</div>
      <div class="cell">F</div>
      <div class="cell">S</div>
      <div class="cell">At</div>
      <div class="cell">Ring</div>
      <div class="cell">Every</div>
      <div class="cell">Until</div>
      <div class="cell">Silence Between Rings</div>
      <div class="cell">Actions</div>
    </div>

    $SCHEDULE

    <div class="row footer">
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell">
          <input style="padding: 8px 8px; width: 100%;"
                 type="button" value="Add" class="button" onclick="onAdd();">
      </div>
    </div>

  </div>

  <div>
    <a href="/ring">Manual Ring</a> | <a href="/config">Advanced Settings</a>
  </div>

  <div class="credit">
    $VERSION<br/>
    (c) 2026 Wannamaker Consulting LLC<br/>
    <a href="mailto:keith@wannamaker.org">keith@wannamaker.org</a><br />
    <a target="_blank" href="https://github.com/wannamak/towerbell/">https://github.com/wannamak/towerbell/</a>
  </div>
</div>

<script lang="javascript">
const serverNow = new Date("$ISO_NOW");
const isoNextRingString = "$ISO_NEXT_RING_MAYBE_EMPTY";
const nextRingOverrideString = "$NEXT_RING_OVERRIDE_STRING_MAYBE_EMPTY";
const numRingsString = "$NEXT_RING_NUM_RINGS";
</script>
<script src="/static/infobox.js"></script>

</body>
</html>
