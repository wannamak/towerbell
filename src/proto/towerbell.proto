syntax = "proto2";

package towerbell;

option java_package = "towerbell";
option java_outer_classname = "Proto";

// Configuration that the web interface cannot modify.
message FixedConfig {
  optional string database_path = 1;

  // Device label for GPIO controller.  Use "pinctrl-bcm2711" for Raspberry PI.
  optional string gpio_label = 2;

  optional int32 server_port = 3;

  // Enables PC testing
  optional bool disable_native = 4;

  optional string template_directory = 5;

  optional string static_file_directory = 6;

  optional bool development_mode = 7;

  optional int32 gpio_logical_pin = 8;

  optional string ringer_classname = 9;

  optional MultiNoteConfig multi_note_config = 10;
}

message MultiNoteConfig {
  optional int32 pcf8574_address = 1;
}